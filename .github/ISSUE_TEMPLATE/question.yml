name: 'Questions / Help 💬'
description: If you have questions, please check StackOverflow or start a new GitHub discussion
title: '[Please read the message below]'
labels: [':speech_balloon: Question']
body:
  - type: markdown
    attributes:
      value: |
        ## Questions and Help 💬

        This issue tracker is reserved for bug reports and feature proposals.

        For anything else, such as questions or getting help, please see:

        - [Docs](https://inversify.io)
        - [GitHub Discussions](https://github.com/inversify/monorepo/discussions)
        - The [inversifyjs](https://stackoverflow.com/questions/tagged/inversifyjs) tag on [StackOverflow](https://stackoverflow.com/questions/ask)
  - type: checkboxes
    id: no-post
    attributes:
      label: |
        Please do not submit this issue.
      description: |
        :bangbang: &nbsp; This issue will be closed. :bangbang:
      options:
        - label: I understand
          required: true
