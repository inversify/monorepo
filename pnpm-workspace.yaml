packages:
  - packages/container/examples/*
  - packages/container/libraries/*
  - packages/container/tools/*
  - packages/docs/services/*
  - packages/docs/tools/*
  - packages/foundation/libraries/*
  - packages/foundation/tools/*
  - packages/framework/*
  - packages/framework/http/libraries/*
  - packages/framework/http/tools/*
  - packages/framework/validation/libraries/*
  - packages/json-schema/libraries/*
  - packages/logger
  - packages/open-api/libraries/*
enablePrePostScripts: true
strictPeerDependencies: false
allowBuilds:
  '@apollo/protobufjs': true
  '@nestjs/core': true
  '@prisma/engines': true
  '@swc/core': true
  better-sqlite3: true
  core-js: true
  core-js-pure: true
  esbuild: true
  oxc-resolver: true
  prisma: true
  sharp: true
  '@scarf/scarf': false
  lmdb: false
  msgpackr-extract: false
